<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="logo" src="icons/icon128.png" alt="Elevator" />
        <span>Elevator</span>
      </div>
      <div id="stageStatus" class="stage-status" title="The tab music plays in">
        No tab selected
      </div>
    </header>

    <!-- Now playing -->
    <section id="player" class="card player hidden">
      <div class="np-title" id="npTitle">Nothing playing</div>

      <div class="seek-row">
        <span class="time" id="curTime">0:00</span>
        <input type="range" id="seek" min="0" max="1000" value="0" step="1" />
        <span class="time" id="durTime">0:00</span>
      </div>

      <div class="controls">
        <button id="prevBtn" class="ctrl" title="Previous">⏮</button>
        <button id="playBtn" class="ctrl play" title="Play/Pause">▶</button>
        <button id="nextBtn" class="ctrl" title="Next">⏭</button>
        <button id="loopBtn" class="ctrl toggle" title="Loop current track">🔁</button>
        <button id="stopBtn" class="ctrl" title="Stop">⏹</button>
      </div>

      <div class="vol-row">
        <span class="vol-ico">🔈</span>
        <input type="range" id="volume" min="0" max="100" value="80" />
        <span class="vol-val" id="volVal">80</span>
        <div class="vol-btns">
          <button id="fadeBtn" class="vbtn" title="Fade out over 4s">🔇</button>
          <button id="speakBtn" class="vbtn" title="Duck to 8% for speaking">🎤</button>
          <button id="playVolBtn" class="vbtn" title="Bring music up to 90%">🔊</button>
        </div>
      </div>
    </section>

    <!-- Playlist -->
    <section class="card playlist">
      <div class="playlist-head">
        <h3>Playlist</h3>
        <button id="clearAll" class="link">Clear all</button>
      </div>
      <ul id="playlist"></ul>
      <p id="emptyMsg" class="hint">No tracks yet. Add one below.</p>
    </section>

    <!-- Add tracks -->
    <details class="card add">
      <summary class="add-summary">Add to playlist</summary>
      <div class="tabs">
        <button class="tab active" data-tab="yt">YouTube</button>
        <button class="tab" data-tab="url">Audio URL</button>
        <button class="tab" data-tab="file">Upload file</button>
      </div>

      <div class="tab-panel active" data-panel="yt">
        <input type="text" id="ytUrl" placeholder="YouTube URL or video ID" />
        <input type="text" id="ytTitle" placeholder="Title (optional)" />
        <button id="addYt" class="primary">Add to playlist</button>
      </div>

      <div class="tab-panel" data-panel="url">
        <input type="text" id="audUrl" placeholder="https://.../song.mp3 or .wav" />
        <input type="text" id="audTitle" placeholder="Title (optional)" />
        <button id="addUrl" class="primary">Add to playlist</button>
      </div>

      <div class="tab-panel" data-panel="file">
        <input type="file" id="audFile" accept="audio/*" multiple />
        <button id="addFile" class="primary">Add file(s) to playlist</button>
        <p class="hint">Stored locally in the extension (IndexedDB).</p>
      </div>
    </details>

    <div id="toast" class="toast hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
